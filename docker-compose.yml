version: '3.8'

services:

  # ── Reverse proxy + SSL automático ────────────────────────────────────────
  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - nginx-certs:/etc/nginx/certs
      - nginx-vhost:/etc/nginx/vhost.d
      - nginx-html:/usr/share/nginx/html
    labels:
      - "com.github.nginx-proxy.nginx"
    restart: unless-stopped

  acme-companion:
    image: nginxproxy/acme-companion
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nginx-certs:/etc/nginx/certs
      - nginx-vhost:/etc/nginx/vhost.d
      - nginx-html:/usr/share/nginx/html
      - acme:/etc/acme.sh
    environment:
      - DEFAULT_EMAIL=${SSL_EMAIL}
      - NGINX_PROXY_CONTAINER=nginx-proxy
    depends_on: [nginx-proxy]
    restart: unless-stopped

  # ── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - VIRTUAL_HOST=api.${DOMAIN}
      - LETSENCRYPT_HOST=api.${DOMAIN}
      - VIRTUAL_PORT=8000
      - PORT=8000
    restart: unless-stopped

  # ── PWA Colaborador ────────────────────────────────────────────────────────
  pwa:
    build: ./pwa-colaborador
    environment:
      - VIRTUAL_HOST=app.${DOMAIN}
      - LETSENCRYPT_HOST=app.${DOMAIN}
      - API_URL=https://api.${DOMAIN}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    restart: unless-stopped

  # ── Painel RH ─────────────────────────────────────────────────────────────
  painel-rh:
    build: ./painel-rh
    environment:
      - VIRTUAL_HOST=rh.${DOMAIN}
      - LETSENCRYPT_HOST=rh.${DOMAIN}
      - API_URL=https://api.${DOMAIN}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    restart: unless-stopped

volumes:
  nginx-certs:
  nginx-vhost:
  nginx-html:
  acme:
