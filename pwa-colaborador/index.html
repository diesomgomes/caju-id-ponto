<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Ponto CAJU ID</title>
  <script src="/config.js"></script>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; }
    .hidden { display: none !important; }
    video { transform: scaleX(-1); }

    .bottom-nav { background: #0f172a; border-top: 1px solid rgba(255,255,255,0.07); }
    .nav-tab { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0; flex: 1; cursor: pointer; transition: color .15s; }
    .nav-tab .nav-icon { font-size: 20px; line-height: 1; }
    .nav-tab .nav-label { font-size: 10px; font-weight: 500; letter-spacing: .02em; }
    .nav-tab.active { color: #10b981; }
    .nav-tab:not(.active) { color: rgba(255,255,255,0.3); }

    .card-dark { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; }
    .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  </style>
</head>
<body class="h-full flex flex-col max-w-md mx-auto relative">

  <!-- ══════════ TELA LOGIN ══════════ -->
  <div id="tela-login" class="hidden flex-col justify-center min-h-screen px-6 py-12">
    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center mx-auto mb-5">
        <span class="text-white text-3xl font-bold">C</span>
      </div>
      <h1 class="text-2xl font-bold text-white">CAJU ID</h1>
      <p class="text-slate-400 mt-1 text-sm">Registro de ponto eletrônico</p>
    </div>
    <form id="form-login" class="space-y-4">
      <div>
        <label class="block text-xs text-slate-400 mb-1.5 font-medium uppercase tracking-wider">E-mail</label>
        <input id="login-email" type="email" autocomplete="email"
          class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 text-sm"
          placeholder="seu@email.com" required />
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1.5 font-medium uppercase tracking-wider">Senha</label>
        <input id="login-senha" type="password" autocomplete="current-password"
          class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 text-sm"
          placeholder="••••••••" required />
      </div>
      <p id="login-erro" class="text-red-400 text-sm min-h-[1.25rem]"></p>
      <button id="btn-login" type="submit"
        class="w-full py-4 bg-emerald-500 hover:bg-emerald-400 rounded-xl font-bold text-base transition text-white mt-2">
        Entrar
      </button>
    </form>
  </div>

  <!-- ══════════ TELA HOME ══════════ -->
  <div id="tela-home" class="hidden flex-col min-h-screen">

    <!-- Header -->
    <div class="px-5 pt-12 pb-4">
      <p id="nome-empresa" class="text-xs font-semibold uppercase tracking-widest" style="color:rgba(16,185,129,0.7)">CAJU ID</p>
      <div class="flex items-center justify-between mt-1">
        <p id="nome-colaborador" class="text-xl font-bold text-white">Colaborador</p>
        <button id="btn-logout"
          class="w-9 h-9 rounded-full flex items-center justify-center text-slate-400 hover:text-red-400 transition"
          style="background:rgba(255,255,255,0.06)">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Data + Relógio -->
    <div class="mx-5 mb-5 card-dark px-5 py-5 text-center">
      <p id="data-hoje" class="text-xs font-medium uppercase tracking-widest text-slate-400 capitalize"></p>
      <p id="relogio" class="text-5xl font-mono font-bold text-white mt-2 tabular-nums tracking-tight"></p>
    </div>

    <!-- Botão principal -->
    <div class="px-5 flex-1 flex flex-col gap-4">
      <button id="btn-ponto"
        class="w-full py-5 rounded-2xl text-lg font-bold text-white bg-emerald-500 hover:bg-emerald-400 transition">
        🟢  ENTRADA
      </button>

      <!-- Último registro -->
      <div class="card-dark px-4 py-4">
        <p class="text-xs font-semibold uppercase tracking-widest text-slate-500 mb-2">Último registro</p>
        <p id="ultima-batida" class="text-slate-300 text-sm">Carregando...</p>
      </div>
    </div>

    <!-- Aviso LGPD -->
    <div id="aviso-lgpd" class="hidden mx-5 mb-4 rounded-xl p-4 text-xs text-slate-400 border border-slate-700" style="background:rgba(255,255,255,0.04)">
      <p class="font-semibold text-slate-200 mb-1">Aviso de privacidade (LGPD)</p>
      <p>Ao registrar o ponto, sua selfie e localização serão coletadas para fins de controle de jornada, conforme art. 11 da Lei 13.709/2018.</p>
      <button id="btn-aceitar-lgpd" class="mt-3 w-full py-2 bg-emerald-600 rounded-lg text-white font-bold">
        Entendi e aceito
      </button>
    </div>

    <!-- Bottom nav -->
    <div class="bottom-nav flex">
      <div class="nav-tab active">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Início</span>
      </div>
      <button id="aba-historico" class="nav-tab">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Meu Ponto</span>
      </button>
      <button id="aba-saldo" class="nav-tab">
        <span class="nav-icon">⏱</span>
        <span class="nav-label">Saldo</span>
      </button>
      <button id="aba-comprovante" class="nav-tab">
        <span class="nav-icon">📄</span>
        <span class="nav-label">Comprovante</span>
      </button>
    </div>
  </div>

  <!-- ══════════ TELA CÂMERA ══════════ -->
  <div id="tela-camera" class="hidden flex-col min-h-screen">
    <div class="flex items-center gap-3 px-5 pt-12 pb-4 border-b border-slate-800">
      <button id="btn-cancelar" class="text-slate-400 text-2xl leading-none">‹</button>
      <div>
        <p class="text-slate-500 text-xs uppercase tracking-wider">Registrando ponto</p>
        <p id="camera-tipo" class="font-bold text-white text-lg"></p>
      </div>
    </div>

    <div class="px-5 py-2">
      <p id="status-gps" class="text-sm text-slate-400"></p>
    </div>

    <div class="flex-1 flex items-center justify-center px-5 py-4">
      <div class="w-full aspect-square rounded-3xl overflow-hidden bg-slate-900 relative">
        <video id="video-camera" autoplay playsinline muted class="w-full h-full object-cover"></video>
        <img id="preview-foto" src="" alt="Preview" class="hidden w-full h-full object-cover" />
      </div>
    </div>

    <canvas id="canvas-foto" class="hidden"></canvas>

    <div class="px-6 pb-12 space-y-3">
      <button id="btn-capturar" class="w-full py-5 bg-white text-gray-900 rounded-2xl font-bold text-lg">
        📸  Tirar foto
      </button>
      <div id="acoes-foto" class="hidden flex gap-3">
        <button id="btn-novamente" class="flex-1 py-4 bg-slate-700 rounded-2xl font-bold text-white">
          Tirar novamente
        </button>
        <button id="btn-confirmar" class="flex-1 py-4 bg-emerald-500 rounded-2xl font-bold text-white">
          ✅ Confirmar
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════ TELA RESULTADO ══════════ -->
  <div id="tela-resultado" class="hidden flex-col min-h-screen items-center justify-center px-6 py-16 gap-8">
    <div id="resultado-box" class="w-full card-dark p-6"></div>
    <button id="btn-voltar-home" class="w-full py-4 bg-emerald-500 hover:bg-emerald-400 rounded-2xl font-bold text-lg text-white transition">
      Voltar ao início
    </button>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
