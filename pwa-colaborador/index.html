<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#f5f5f7" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Ponto CAJU ID</title>
  <script src="/config.js"></script>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { background: #f5f5f7; color: #18181b; font-family: system-ui, -apple-system, sans-serif; }
    .hidden { display: none !important; }
    video { transform: scaleX(-1); }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 0 0 0.5px rgba(0,0,0,0.08); }
    .bottom-nav { background: #fff; border-top: 1px solid rgba(0,0,0,0.07); }
    .nav-tab { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0; flex: 1; cursor: pointer; transition: color .15s; border: none; background: none; }
    .nav-tab .nav-icon { font-size: 20px; line-height: 1; }
    .nav-tab .nav-label { font-size: 10px; font-weight: 600; letter-spacing: .03em; }
    .nav-tab.active { color: #059669; }
    .nav-tab:not(.active) { color: #a1a1aa; }
    input[type="email"], input[type="password"] {
      background: #f4f4f5; border: 1px solid #e4e4e7; border-radius: 12px;
      padding: 14px 16px; font-size: 15px; color: #18181b; outline: none; width: 100%;
      transition: border-color .15s;
    }
    input:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.12); }
  </style>
</head>
<body class="h-full flex flex-col max-w-md mx-auto relative">

  <!-- ══════════ TELA LOGIN ══════════ -->
  <div id="tela-login" class="hidden flex-col justify-center min-h-screen px-6 py-12">
    <div class="text-center mb-8">
      <div id="login-logo-wrap" class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-sm">
        <span class="text-white text-3xl font-bold">C</span>
      </div>
      <h1 id="login-empresa-nome" class="text-2xl font-bold" style="color:#18181b">CAJU ID</h1>
      <p class="mt-1 text-sm" style="color:#71717a">Registro de ponto eletrônico</p>
    </div>
    <div class="card p-6 space-y-4">
      <form id="form-login" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold mb-1.5 uppercase tracking-wider" style="color:#71717a">E-mail</label>
          <input id="login-email" type="email" autocomplete="email" placeholder="seu@email.com" required />
        </div>
        <div>
          <label class="block text-xs font-semibold mb-1.5 uppercase tracking-wider" style="color:#71717a">Senha</label>
          <input id="login-senha" type="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>
        <p id="login-erro" class="text-red-500 text-sm min-h-[1.25rem]"></p>
        <button id="btn-login" type="submit"
          class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 rounded-xl font-bold text-base text-white transition mt-1">
          Entrar
        </button>
      </form>
    </div>
  </div>

  <!-- ══════════ TELA HOME ══════════ -->
  <div id="tela-home" class="hidden flex-col min-h-screen">

    <!-- Header -->
    <div class="bg-white px-5 pt-12 pb-4" style="border-bottom:1px solid rgba(0,0,0,0.07)">
      <p id="nome-empresa" class="text-xs font-semibold uppercase tracking-widest" style="color:#10b981">CAJU ID</p>
      <div class="flex items-center justify-between mt-1">
        <p id="nome-colaborador" class="text-xl font-bold" style="color:#18181b">Colaborador</p>
        <button id="btn-logout"
          class="w-9 h-9 rounded-full flex items-center justify-center transition hover:bg-red-50"
          style="background:#f4f4f5; color:#a1a1aa">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Data + Relógio -->
    <div class="px-5 pt-5 pb-3">
      <div class="card px-5 py-5 text-center">
        <p id="data-hoje" class="text-xs font-semibold uppercase tracking-widest capitalize" style="color:#a1a1aa"></p>
        <p id="relogio" class="text-5xl font-mono font-bold mt-2 tabular-nums" style="color:#18181b"></p>
      </div>
    </div>

    <!-- Botão principal + badge de tipo -->
    <div class="px-5 flex flex-col gap-2">
      <button id="btn-ponto"
        class="w-full py-5 rounded-2xl text-lg font-bold text-white bg-emerald-500 hover:bg-emerald-600 transition shadow-sm">
        Registrar Ponto
      </button>
      <!-- Indicador dinâmico do tipo de registro -->
      <div id="tipo-ponto" class="flex justify-center min-h-[36px] items-center"></div>

      <!-- Último registro -->
      <div class="card px-4 py-4">
        <p class="text-xs font-semibold uppercase tracking-widest mb-2" style="color:#a1a1aa">Último registro</p>
        <p id="ultima-batida" class="text-sm" style="color:#71717a">Carregando...</p>
      </div>
    </div>

    <!-- Aviso LGPD -->
    <div id="aviso-lgpd" class="hidden mx-5 mt-3 rounded-xl p-4 text-xs border" style="background:#fffbeb;border-color:#fde68a;color:#92400e">
      <p class="font-semibold mb-1" style="color:#78350f">Aviso de privacidade (LGPD)</p>
      <p>Ao registrar o ponto, sua selfie e localização serão coletadas para fins de controle de jornada, conforme art. 11 da Lei 13.709/2018.</p>
      <button id="btn-aceitar-lgpd" class="mt-3 w-full py-2 bg-emerald-500 rounded-lg text-white font-bold text-sm">
        Entendi e aceito
      </button>
    </div>

    <div class="flex-1"></div>

    <!-- Bottom nav -->
    <div class="bottom-nav flex">
      <div class="nav-tab active">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Início</span>
      </div>
      <button id="aba-historico" class="nav-tab">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Meu Ponto</span>
      </button>
      <button id="aba-saldo" class="nav-tab">
        <span class="nav-icon">⏱</span>
        <span class="nav-label">Saldo</span>
      </button>
      <button id="aba-comprovante" class="nav-tab">
        <span class="nav-icon">📄</span>
        <span class="nav-label">Comprovante</span>
      </button>
    </div>
  </div>

  <!-- ══════════ TELA CÂMERA ══════════ -->
  <div id="tela-camera" class="hidden flex-col min-h-screen">
    <div class="flex items-center gap-3 px-5 pt-12 pb-4 bg-white" style="border-bottom:1px solid rgba(0,0,0,0.07)">
      <button id="btn-cancelar" class="text-2xl leading-none" style="color:#a1a1aa">‹</button>
      <div>
        <p class="text-xs uppercase tracking-wider font-semibold" style="color:#a1a1aa">Registrando ponto</p>
        <p id="camera-tipo" class="font-bold text-lg" style="color:#18181b"></p>
      </div>
    </div>

    <div class="px-5 py-3">
      <p id="status-gps" class="text-sm" style="color:#71717a"></p>
    </div>

    <div class="flex-1 flex items-center justify-center px-5 py-4">
      <div class="w-full aspect-square rounded-3xl overflow-hidden relative" style="background:#e4e4e7">
        <video id="video-camera" autoplay playsinline muted class="w-full h-full object-cover"></video>
        <img id="preview-foto" src="" alt="Preview" class="hidden w-full h-full object-cover" />
      </div>
    </div>

    <canvas id="canvas-foto" class="hidden"></canvas>

    <div class="px-6 pb-12 space-y-3">
      <button id="btn-capturar" class="w-full py-5 rounded-2xl font-bold text-lg text-white bg-emerald-500 hover:bg-emerald-600 transition">
        📸  Tirar foto
      </button>
      <div id="acoes-foto" class="hidden flex gap-3">
        <button id="btn-novamente" class="flex-1 py-4 rounded-2xl font-bold" style="background:#f4f4f5;color:#18181b">
          Tirar novamente
        </button>
        <button id="btn-confirmar" class="flex-1 py-4 bg-emerald-500 hover:bg-emerald-600 rounded-2xl font-bold text-white transition">
          ✅ Confirmar
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════ TELA RESULTADO ══════════ -->
  <div id="tela-resultado" class="hidden flex-col min-h-screen items-center justify-center px-6 py-16 gap-6">
    <div id="resultado-box" class="w-full card p-6"></div>
    <button id="btn-voltar-home" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 rounded-2xl font-bold text-lg text-white transition">
      Voltar ao início
    </button>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
