<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#10b981" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Ponto CAJU ID</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #111827; color: #f9fafb; font-family: system-ui, sans-serif; }
    .hidden { display: none !important; }
    video { transform: scaleX(-1); }
  </style>
</head>
<body class="h-full flex flex-col max-w-md mx-auto relative">

  <!-- ══════════ TELA LOGIN ══════════ -->
  <div id="tela-login" class="hidden flex-col justify-center min-h-screen px-6 py-12">
    <div class="text-center mb-10">
      <div class="text-5xl mb-4">🕐</div>
      <h1 class="text-3xl font-bold text-emerald-400">Ponto CAJU ID</h1>
      <p class="text-gray-400 mt-1 text-sm">Registro de jornada de trabalho</p>
    </div>
    <form id="form-login" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-400 mb-1">E-mail</label>
        <input id="login-email" type="email" autocomplete="email"
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500"
          placeholder="seu@email.com" required />
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1">Senha</label>
        <input id="login-senha" type="password" autocomplete="current-password"
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500"
          placeholder="••••••••" required />
      </div>
      <p id="login-erro" class="text-red-400 text-sm min-h-[1.25rem]"></p>
      <button id="btn-login" type="submit"
        class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 rounded-xl font-bold text-lg transition">
        Entrar
      </button>
    </form>
  </div>

  <!-- ══════════ TELA HOME ══════════ -->
  <div id="tela-home" class="hidden flex-col min-h-screen">
    <!-- Header -->
    <div class="flex items-center justify-between px-5 pt-10 pb-4 border-b border-gray-800">
      <div>
        <p id="nome-colaborador" class="font-bold text-lg text-white">Colaborador</p>
      </div>
      <button id="btn-logout" class="text-gray-400 text-sm hover:text-white transition">Sair</button>
    </div>

    <!-- Data e relógio -->
    <div class="text-center py-6 border-b border-gray-800">
      <p id="data-hoje" class="text-gray-400 text-sm capitalize"></p>
      <p id="relogio" class="text-5xl font-mono font-bold text-white mt-2 tabular-nums"></p>
    </div>

    <!-- Botão principal -->
    <div class="flex-1 flex flex-col items-center justify-center px-6 py-10 gap-6">
      <button id="btn-ponto"
        class="w-full py-6 rounded-2xl text-xl font-bold text-white bg-emerald-500 hover:bg-emerald-600 transition">
        🟢  ENTRADA
      </button>
      <div class="text-center">
        <p class="text-gray-500 text-xs uppercase tracking-wider mb-1">Último registro</p>
        <p id="ultima-batida" class="text-gray-300 text-sm">Carregando...</p>
      </div>
    </div>

    <!-- Aviso LGPD (exibido uma vez) -->
    <div id="aviso-lgpd" class="hidden mx-5 mb-4 bg-gray-800 rounded-xl p-4 text-xs text-gray-400 border border-gray-700">
      <p class="font-semibold text-gray-200 mb-1">📋 Aviso de privacidade (LGPD)</p>
      <p>Ao registrar o ponto, sua selfie e localização serão coletadas para fins de controle de jornada, conforme o art. 11 da Lei 13.709/2018.</p>
      <button id="btn-aceitar-lgpd" class="mt-3 w-full py-2 bg-emerald-600 rounded-lg text-white font-bold">
        Entendi e aceito
      </button>
    </div>

    <!-- Abas inferiores -->
    <div class="flex border-t border-gray-800">
      <button id="aba-historico" class="flex-1 py-4 text-center text-gray-400 hover:text-white transition text-sm">
        📋 Meu Ponto
      </button>
      <button id="aba-saldo" class="flex-1 py-4 text-center text-gray-400 hover:text-white transition text-sm">
        ⏱ Saldo
      </button>
    </div>
  </div>

  <!-- ══════════ TELA CÂMERA ══════════ -->
  <div id="tela-camera" class="hidden flex-col min-h-screen">
    <div class="flex items-center gap-3 px-5 pt-10 pb-4 border-b border-gray-800">
      <button id="btn-cancelar" class="text-gray-400 text-2xl leading-none">‹</button>
      <div>
        <p class="text-gray-400 text-xs uppercase tracking-wider">Registrando</p>
        <p id="camera-tipo" class="font-bold text-white text-lg"></p>
      </div>
    </div>

    <div class="px-5 py-2">
      <p id="status-gps" class="text-sm text-gray-400"></p>
    </div>

    <!-- Câmera / Preview -->
    <div class="flex-1 flex items-center justify-center px-5 py-4">
      <div class="w-full aspect-square rounded-2xl overflow-hidden bg-gray-900 relative">
        <video id="video-camera" autoplay playsinline muted
          class="w-full h-full object-cover"></video>
        <img id="preview-foto" src="" alt="Preview"
          class="hidden w-full h-full object-cover" />
      </div>
    </div>

    <canvas id="canvas-foto" class="hidden"></canvas>

    <!-- Controles -->
    <div class="px-6 pb-10 space-y-3">
      <button id="btn-capturar"
        class="w-full py-5 bg-white text-gray-900 rounded-2xl font-bold text-lg">
        📸 Tirar foto
      </button>
      <div id="acoes-foto" class="hidden flex gap-3">
        <button id="btn-novamente"
          class="flex-1 py-4 bg-gray-700 rounded-2xl font-bold text-white">
          Tirar novamente
        </button>
        <button id="btn-confirmar"
          class="flex-1 py-4 bg-emerald-500 rounded-2xl font-bold text-white">
          ✅ Confirmar
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════ TELA RESULTADO ══════════ -->
  <div id="tela-resultado" class="hidden flex-col min-h-screen items-center justify-center px-6 py-16 gap-8">
    <div id="resultado-box" class="w-full bg-gray-800 rounded-2xl p-6"></div>
    <button id="btn-voltar-home"
      class="w-full py-4 bg-emerald-600 rounded-2xl font-bold text-lg text-white">
      Voltar ao início
    </button>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
